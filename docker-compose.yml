version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: planttracker
      POSTGRES_USER: planttracker
      POSTGRES_PASSWORD: planttracker
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planttracker -d planttracker"]
      interval: 5s
      timeout: 5s
      retries: 10
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://planttracker:planttracker@db:5432/planttracker
      PORT: 3000
      VAPID_MAILTO: ${VAPID_MAILTO}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
    depends_on:
      db:
        condition: service_healthy
volumes:
  pgdata:
