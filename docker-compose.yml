version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: planttracker
      POSTGRES_USER: planttracker
      POSTGRES_PASSWORD: planttracker
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://planttracker:planttracker@db:5432/planttracker
      PORT: 3000
    depends_on:
      - db
volumes:
  pgdata:
